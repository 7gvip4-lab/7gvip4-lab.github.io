    <style>
        :root {
            /* Hacker Theme (Default) */
            --bg-color: #0c0c0c;
            --text-main: #e0e0e0;
            --text-green: #00ff41;
            --text-blue: #3b8eea;
            --text-yellow: #f1fa8c;
            --text-red: #ff5555;
            --quick-bg: #1a1a1a;
            --btn-bg: #2d2d2d;
            
            --font-code: 'Fira Code', monospace;
            --font-ar: 'Tajawal', sans-serif;
        }

        /* Light Theme */
        body.theme-light {
            --bg-color: #f4f4f4;
            --text-main: #333333;
            --text-green: #008000;
            --text-blue: #0000ff;
            --text-yellow: #b58900;
            --text-red: #dc322f;
            --quick-bg: #e0e0e0;
            --btn-bg: #d0d0d0;
        }

        /* Dracula Theme */
        body.theme-dracula {
            --bg-color: #282a36;
            --text-main: #f8f8f2;
            --text-green: #50fa7b;
            --text-blue: #bd93f9;
            --text-yellow: #f1fa8c;
            --text-red: #ff5555;
            --quick-bg: #21222c;
            --btn-bg: #44475a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-code);
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 15px;
            transition: background-color 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--btn-bg); border-radius: 4px; }

        #terminal-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            direction: ltr; /* Commands are always LTR */
            text-align: left;
            position: relative;
            z-index: 10;
        }

        .output-line {
            margin-bottom: 0.5rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .output-line.arabic-text {
            font-family: var(--font-ar);
            direction: rtl;
            text-align: right;
            font-size: 1.15rem;
            color: var(--text-main);
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            line-height: 1.8;
        }

        .prompt-user { color: var(--text-green); font-weight: bold; }
        .prompt-dir { color: var(--text-blue); font-weight: bold; }
        .prompt-symbol { color: var(--text-main); }

        #input-container { display: flex; align-items: center; margin-top: 0.5rem; }

        #command-input {
            background: transparent;
            border: none;
            color: var(--text-yellow);
            font-family: var(--font-code);
            font-size: 15px;
            flex: 1;
            outline: none;
            margin-left: 8px;
            caret-color: var(--text-green);
        }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--text-green);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
            display: none;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #quick-actions {
            background-color: var(--quick-bg);
            border-top: 1px solid var(--btn-bg);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            direction: ltr;
            flex-wrap: nowrap;
            white-space: nowrap;
            z-index: 10;
        }

        .cmd-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid transparent;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            font-family: var(--font-code);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cmd-btn:hover {
            color: var(--text-green);
            border-color: var(--text-green);
        }

        a { color: var(--text-blue); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .highlight { color: var(--text-yellow); }
        .error { color: var(--text-red); }

        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            display: none;
            pointer-events: none;
        }
        
        .box-container {
            border: 1px dashed var(--btn-bg);
            padding: 15px;
            margin: 5px 0 15px 0;
            border-radius: 5px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>

            if (!audioCtx) return;

                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch(e) {}
        }

            if (!audioCtx) {

                case 'theme light': document.body.className = 'theme-light'; printLine('Theme updated to Light.'); break;
                case 'theme hacker': document.body.className = ''; printLine('Theme updated to Hacker.'); break;
                case 'theme dracula': document.body.className = 'theme-dracula'; printLine('Theme updated to Dracula.'); break;
                case 'coffee': printLine(coffeeArt); break;
                case 'matrix': startMatrix(); printLine('<span class="text-green-400">Wake up, Neo... (Click anywhere to exit)</span>'); break;
                case 'sudo': case 'sudo su': printLine(`<span class="error">Nice try! You are not in the sudoers file. This incident will be reported.</span>`); break;

                    if(cmd.startsWith('theme ')) {
                        printLine(`<span class="error">Unknown theme. Try: theme hacker, theme light, theme dracula.</span>`);
                    } else {
                        printLine(`<span class="error">Command not found: ${cmd}</span><br>Type 'help' to see available commands.`);
                    }
            }
        }

        async function typeAndExecute(cmd) {

            isTyping = true;
            commandInput.style.display = 'none';
            fakeCursor.style.display = 'inline-block';

            commandInput.style.display = 'block';
            commandInput.value = '';
            fakeCursor.style.display = 'none';
            isTyping = false;
            focusInput();
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        function scrollToBottom() { const c = document.getElementById('terminal-container'); c.scrollTop = c.scrollHeight; }
        function focusInput() { if (!isTyping && !isMatrixActive) commandInput.focus(); }

        let matrixInterval;
        function startMatrix() {
            isMatrixActive = true;
            matrixCanvas.style.display = 'block';
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;

            const letters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789مرحباً';
            const fontSize = 16;
            const columns = matrixCanvas.width / fontSize;
            const drops = Array.from({length: columns}).fill(1);

            matrixInterval = setInterval(() => {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
                ctx.fillStyle = '#0F0';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = letters.charAt(Math.floor(Math.random() * letters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }, 33);
        }

        function stopMatrix() {
            isMatrixActive = false;
            matrixCanvas.style.display = 'none';
            clearInterval(matrixInterval);
            focusInput();
        }

        window.addEventListener('resize', () => {
            if(isMatrixActive) {
                matrixCanvas.width = window.innerWidth;
                matrixCanvas.height = window.innerHeight;
            }
        });

        window.onload = runBootSequence;

    </script>
</body>
</html>
